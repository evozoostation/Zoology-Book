kind = "web"
previewPath = "/"
title = "Libro Interactivo de Zoología"
version = "1.0.0"
id = "artifacts/zoology-book"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22301

[services.development]
run = "pnpm --filter @workspace/zoology-book run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zoology-book", "run", "build" ]
publicDir = "artifacts/zoology-book/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22301"
BASE_PATH = "/"
